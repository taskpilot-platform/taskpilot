server:
  port: 8080

spring:
  config:
    activate:
      on-profile: dev

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        format-sql: true

  flyway:
    fail-on-missing-locations: false

logging:
  level:
    org.springframework.security: DEBUG
    com.taskpilot: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always

  cors:
  allowed-origins: http://localhost:*
