spring:
  application:
    name: taskpilot-app
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}
    password-reset:
      expiration: ${PASSWORD_RESET_EXPIRATION:900000}
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:3000/reset-password}
  mail:
    from: ${MAIL_FROM:no-reply@taskpilot.local}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method