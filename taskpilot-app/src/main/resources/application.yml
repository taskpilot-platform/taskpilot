spring:
  application:
    name: taskpilot-app
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}
  output:
    ansi:
      enabled: always
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:20000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:3000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:60000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:120000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:30000}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT_MS:0}

  jpa:
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL:false}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}
      blocklist:
        provider: ${JWT_BLOCKLIST_PROVIDER:memory}
    password-reset:
      expiration: ${PASSWORD_RESET_EXPIRATION:900000}
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
      rate-limit:
        provider: ${PASSWORD_RESET_RATE_LIMIT_PROVIDER:${JWT_BLOCKLIST_PROVIDER:memory}}
        cooldown-seconds: ${PASSWORD_RESET_COOLDOWN_SECONDS:60}
        max-per-email-per-hour: ${PASSWORD_RESET_MAX_PER_EMAIL_PER_HOUR:5}
        max-per-ip-per-hour: ${PASSWORD_RESET_MAX_PER_IP_PER_HOUR:20}
  mail:
    from: ${MAIL_FROM:no-reply@taskpilot.local}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    # Quality-first primary. Fallbacks prefer models that currently have text-out quota.
    model-name: ${AI_GEMINI_MODEL:gemini-3.5-flash}
    # Queue: primary -> callable text-out fallbacks -> quota-limited fallbacks -> external fallback.
    fallback1-model: ${AI_GEMINI_FALLBACK1_MODEL:gemini-2.5-flash}
    fallback2-model: ${AI_GEMINI_FALLBACK2_MODEL:gemini-3.1-flash-lite}
    fallback3-model: ${AI_GEMINI_FALLBACK3_MODEL:gemini-2.5-flash-lite}
    fallback4-model: ${AI_GEMINI_FALLBACK4_MODEL:gemini-2.5-pro}
    fallback5-model: ${AI_GEMINI_FALLBACK5_MODEL:gemini-2.0-flash}
    fallback6-model: ${AI_GEMINI_FALLBACK6_MODEL:gemini-2.0-flash-lite}
    fallback7-model: ${AI_GEMINI_FALLBACK7_MODEL:gemini-3.1-pro-preview}
    waterfall-max-attempts: ${AI_GEMINI_WATERFALL_MAX_ATTEMPTS:2}
    use-for-tools: ${AI_GEMINI_USE_FOR_TOOLS:true}
    timeout-seconds: ${AI_GEMINI_TIMEOUT_SECONDS:45}

  github:
    token: ${GITHUB_TOKEN}
    fallback-model: ${AI_GITHUB_FALLBACK_MODEL:gpt-4o}
    reasoning-model: ${AI_GITHUB_REASONING_MODEL:DeepSeek-R1}

  groq:
    enabled: ${AI_GROQ_ENABLED:false}
    api-key: ${GROQ_API_KEY:}
    base-url: ${AI_GROQ_BASE_URL:https://api.groq.com/openai/v1}
    reasoning-model: ${AI_GROQ_REASONING_MODEL:openai/gpt-oss-120b}
    gatekeeper-model: ${AI_GROQ_GATEKEEPER_MODEL:llama-3.1-8b-instant}

  openrouter:
    enabled: ${AI_OPENROUTER_ENABLED:false}
    api-key: ${OPENROUTER_API_KEY:}
    api-keys: ${OPENROUTER_API_KEYS:}
    base-url: ${AI_OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    reasoning-model: ${AI_OPENROUTER_REASONING_MODEL:openai/gpt-oss-120b:free}
    reasoning-fallback1-model: ${AI_OPENROUTER_REASONING_FALLBACK1_MODEL:moonshotai/kimi-k2.6:free}
    reasoning-fallback2-model: ${AI_OPENROUTER_REASONING_FALLBACK2_MODEL:z-ai/glm-4.5-air:free}
    reasoning-fallback3-model: ${AI_OPENROUTER_REASONING_FALLBACK3_MODEL:poolside/laguna-xs.2:free}
    reasoning-fallback4-model: ${AI_OPENROUTER_REASONING_FALLBACK4_MODEL:nvidia/nemotron-3-nano-omni-30b-a3b-reasoning:free}
    reasoning-fallback5-model: ${AI_OPENROUTER_REASONING_FALLBACK5_MODEL:google/gemma-4-31b-it:free}
    reasoning-fallback6-model: ${AI_OPENROUTER_REASONING_FALLBACK6_MODEL:google/gemma-4-26b-a4b-it:free}
    reasoning-fallback7-model: ${AI_OPENROUTER_REASONING_FALLBACK7_MODEL:openai/gpt-oss-20b:free}
    reasoning-fallback8-model: ${AI_OPENROUTER_REASONING_FALLBACK8_MODEL:}
    reasoning-fallback9-model: ${AI_OPENROUTER_REASONING_FALLBACK9_MODEL:}
    reasoning-fallback10-model: ${AI_OPENROUTER_REASONING_FALLBACK10_MODEL:}

  model:
    timeout-seconds: ${AI_MODEL_TIMEOUT:60}

  routing:
    token-threshold: ${AI_TOKEN_THRESHOLD:15000}
    reasoning-keywords: ${AI_REASONING_KEYWORDS:analyze,reason,strategy,architecture,tradeoff,root cause,plan,optimize,design,deep dive,phan tich,chien luoc,so sanh,vi sao,giai thich,ly do,danh gia,lua chon,phan ra,boc tach,lo trinh,breakdown,roadmap,rui ro,tre han,be tac,nguyen nhan,giai phap,bottleneck,risk,qua tai,can bang,xung dot,kien truc,thiet ke he thong,database,toi uu,system design,refactor}
    tool-keywords: ${AI_TOOL_KEYWORDS:project,task,sprint,comment,member,role,status,project status,workload,assign,candidates,task list,project progress,my projects,project list,unassigned,not assigned,confirm,confirm_action,apply,xac nhan,dong y,thuc hien,du an,liet ke project,liet ke du an,chua phan cong,chua duoc phan cong,task chua gan,giao viec,tinh trang,tien do,danh sach task,cong viec,ung vien,giao task,gan task,chia viec,tao task}
    ahp-fallback-keywords: ${AI_AHP_FALLBACK_KEYWORDS:phan cong,giao viec,chia viec,chon ai,chon nguoi,tim nguoi,ai ranh,ung vien,assign,candidate,workload,chia task}

  heuristic:
    cache-ttl-seconds: ${AI_HEURISTIC_CACHE_TTL:60}

  chat:
    history-size: ${AI_HISTORY_SIZE:30}
    memory-max-tokens: ${AI_MEMORY_MAX_TOKENS:15000}
    context-tail-messages: ${AI_CONTEXT_TAIL_MESSAGES:10}
    compact-summary-max-chars: ${AI_COMPACT_SUMMARY_MAX_CHARS:5000}
    compact-message-max-chars: ${AI_COMPACT_MESSAGE_MAX_CHARS:2000}
    max-tool-result-memory-chars: ${AI_MAX_TOOL_RESULT_MEMORY_CHARS:30000}
    stream-first-response-timeout-seconds: ${AI_STREAM_FIRST_RESPONSE_TIMEOUT_SECONDS:30}
    text-only-first-response-timeout-seconds: ${AI_TEXT_ONLY_FIRST_RESPONSE_TIMEOUT_SECONDS:10}
    max-user-input-chars: ${AI_MAX_USER_INPUT_CHARS:10000}
    max-user-input-tokens: ${AI_MAX_USER_INPUT_TOKENS:10000}
    max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:8000}
    max-assistant-memory-chars: ${AI_MAX_ASSISTANT_MEMORY_CHARS:6000}

onesignal:
  app-id: ${ONESIGNAL_APP_ID:}
  api-key: ${ONESIGNAL_REST_API_KEY:}

supabase:
  s3:
    endpoint: ${SUPABASE_S3_ENDPOINT:https://xxxx.supabase.co/storage/v1/s3}
    access-key: ${SUPABASE_S3_ACCESS_KEY:key}
    secret-key: ${SUPABASE_S3_SECRET_KEY:secret}
    region: ${SUPABASE_S3_REGION:ap-southeast-1}
    bucket: ${SUPABASE_S3_BUCKET:avatars}
    public-url: ${SUPABASE_S3_PUBLIC_URL:https://xxxx.supabase.co/storage/v1/object/public/avatars}
