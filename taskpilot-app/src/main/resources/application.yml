spring:
  application:
    name: taskpilot-app
  profiles:
    active: ai-dev
  output:
    ansi:
      enabled: always
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver
    hikari:
      maximum-pool-size: ${DB_POOL_MAX_SIZE:5}
      minimum-idle: ${DB_POOL_MIN_IDLE:1}
      connection-timeout: ${DB_CONNECTION_TIMEOUT_MS:10000}
      validation-timeout: ${DB_VALIDATION_TIMEOUT_MS:5000}
      idle-timeout: ${DB_IDLE_TIMEOUT_MS:300000}
      max-lifetime: ${DB_MAX_LIFETIME_MS:1800000}
      keepalive-time: ${DB_KEEPALIVE_TIME_MS:300000}
      initialization-fail-timeout: ${DB_INITIALIZATION_FAIL_TIMEOUT_MS:0}

  jpa:
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL:false}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}
      blocklist:
        provider: ${JWT_BLOCKLIST_PROVIDER:memory}
    password-reset:
      expiration: ${PASSWORD_RESET_EXPIRATION:900000}
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
      rate-limit:
        provider: ${PASSWORD_RESET_RATE_LIMIT_PROVIDER:${JWT_BLOCKLIST_PROVIDER:memory}}
        cooldown-seconds: ${PASSWORD_RESET_COOLDOWN_SECONDS:60}
        max-per-email-per-hour: ${PASSWORD_RESET_MAX_PER_EMAIL_PER_HOUR:5}
        max-per-ip-per-hour: ${PASSWORD_RESET_MAX_PER_IP_PER_HOUR:20}
  mail:
    from: ${MAIL_FROM:no-reply@taskpilot.local}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model-name: ${AI_GEMINI_MODEL:gemini-2.5-flash}
    timeout-seconds: ${AI_GEMINI_TIMEOUT_SECONDS:20}

  github:
    token: ${GITHUB_TOKEN}
    fallback-model: ${AI_GITHUB_FALLBACK_MODEL:gpt-4o}
    reasoning-model: ${AI_GITHUB_REASONING_MODEL:DeepSeek-R1}

  groq:
    enabled: ${AI_GROQ_ENABLED:false}
    api-key: ${GROQ_API_KEY:}
    base-url: ${AI_GROQ_BASE_URL:https://api.groq.com/openai/v1}
    reasoning-model: ${AI_GROQ_REASONING_MODEL:openai/gpt-oss-120b}
    gatekeeper-model: ${AI_GROQ_GATEKEEPER_MODEL:llama-3.1-8b-instant}

  model:
    timeout-seconds: ${AI_MODEL_TIMEOUT:60}

  routing:
    token-threshold: ${AI_TOKEN_THRESHOLD:6000}
    reasoning-keywords: ${AI_REASONING_KEYWORDS:analyze,reason,strategy,architecture,tradeoff,root cause,plan,optimize,design,deep dive,phân tích,chiến lược,so sánh,vì sao,giải thích,lý do,đánh giá,lựa chọn,phân rã,bóc tách,lộ trình,breakdown,roadmap,rủi ro,trễ hạn,bế tắc,nguyên nhân,giải pháp,bottleneck,risk,quá tải,cân bằng,xung đột,kiến trúc,thiết kế hệ thống,database,tối ưu,architecture,system design,refactor}
    tool-keywords: ${AI_TOOL_KEYWORDS:project status,workload,assign,candidates,task list,project progress,my projects,project list,unassigned,not assigned,confirm,confirm_action,apply,xac nhan,dong y,thuc hien,du an,liet ke project,liet ke du an,chua phan cong,chua duoc phan cong,task chua gan,giao việc,tình trạng,tiến độ,danh sách task,công việc,ứng viên,giao task,gán task,gánh bug,chia việc,tạo task}

  heuristic:
    cache-ttl-seconds: ${AI_HEURISTIC_CACHE_TTL:60}

  chat:
    history-size: ${AI_HISTORY_SIZE:10}
    memory-max-tokens: ${AI_MEMORY_MAX_TOKENS:7000}
    context-tail-messages: ${AI_CONTEXT_TAIL_MESSAGES:6}
    compact-summary-max-chars: ${AI_COMPACT_SUMMARY_MAX_CHARS:3000}
    compact-message-max-chars: ${AI_COMPACT_MESSAGE_MAX_CHARS:600}
    max-tool-result-memory-chars: ${AI_MAX_TOOL_RESULT_MEMORY_CHARS:12000}
    max-user-input-chars: ${AI_MAX_USER_INPUT_CHARS:1500}
    max-user-input-tokens: ${AI_MAX_USER_INPUT_TOKENS:2500}
    max-output-tokens: ${AI_MAX_OUTPUT_TOKENS:3500}
    max-assistant-memory-chars: ${AI_MAX_ASSISTANT_MEMORY_CHARS:1500}

onesignal:
  app-id: ${ONESIGNAL_APP_ID:}
  api-key: ${ONESIGNAL_REST_API_KEY:}
