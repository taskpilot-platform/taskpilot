spring:
  application:
    name: taskpilot-app
  profiles:
    active: dev
  output:
    ansi:
      enabled: always
  task:
    execution:
      pool:
        core-size: 4
        max-size: 16
        queue-capacity: 100
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    properties:
      hibernate:
        jdbc:
          "[time_zone]": UTC

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: ${REDIS_TIMEOUT:2s}
      ssl:
        enabled: ${REDIS_SSL:false}

application:
  security:
    jwt:
      secret-key: ${JWT_SECRET}
      expiration: ${JWT_EXPIRATION}
      blocklist:
        provider: ${JWT_BLOCKLIST_PROVIDER:memory}
    password-reset:
      expiration: ${PASSWORD_RESET_EXPIRATION:900000}
      frontend-reset-url: ${PASSWORD_RESET_FRONTEND_URL:http://localhost:5173/reset-password}
  mail:
    from: ${MAIL_FROM:no-reply@taskpilot.local}

springdoc:
  swagger-ui:
    tags-sorter: alpha
    operations-sorter: method

ai:
  gemini:
    api-key: ${GEMINI_API_KEY}
    model-name: ${AI_GEMINI_MODEL:gemini-2.5-flash}

  github:
    token: ${GITHUB_TOKEN}
    fallback-model: ${AI_GITHUB_FALLBACK_MODEL:gpt-4o}
    reasoning-model: ${AI_GITHUB_REASONING_MODEL:DeepSeek-R1}

  model:
    timeout-seconds: ${AI_MODEL_TIMEOUT:60}

  routing:
    token-threshold: ${AI_TOKEN_THRESHOLD:6000}

  chat:
    history-size: ${AI_HISTORY_SIZE:20}
